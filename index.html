<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Block</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="window-block">

        <div class="window__header">
            <div class="window__header-img-left">
                <img src="icons/burger.png" alt="" class="img">
                <img src="icons/Group.png" class="img-cps" />
            </div>


            <div class="window__header-right">
                <img src="icons/search.png" class="img" />
            </div>

        </div>


        <div class="text-block">

            <a href="https://www.youtube.com/watch?v=01e5SAvJfpg" class="text-block__text-kriss">Ремонт техники</a>
            <div class="text-block__text">Услуги и сервисы</div>
            <div class="text-block__text">Корпоративным клиентам</div>
            <div class="text-block__text">Продавцам техники</div>
            <div class="text-block__text">Партнерам</div>
            <div class="text-block__text">Производителям</div>
            <div class="text-block__text">Наши сервисные центры</div>
            <div class="text-block__text">Контакты</div>

        </div>

        <div class="end-block">
            <div class="end-block__icons">
                <img src="icons/chat.png" alt="" class="img">
                <img src="icons/chat copy.png" alt="" class="img">
                <img src="icons/profile.png" alt="" class="img">
            </div>

            <div class="end-block__email">mail@cps.com</div>

            <div class="end-block__phone">8 800 890 8900</div>


            <div class="end-block__language-block">
                <div class="end-block__language-block-text">RU</div>
                <div class="end-block__language-block-text">EN</div>
                <div class="end-block__language-block-text">CH</div>
            </div>

        </div>

    </div>

</body>

</html>
